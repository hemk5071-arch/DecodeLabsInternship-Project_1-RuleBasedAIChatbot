<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai-Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='chatbot-style.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🤖 Pixl-AI</h2>
            
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="bot-message">
                <p>Welcome to pixl! Feed your curiosity.</p>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="what's on your mind?">
            <button id="send-button">Send</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='chatbot-script.js') }}"></script>
</body>
</html>
